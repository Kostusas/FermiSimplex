[workspace]
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "osx-64", "win-64"]

[dependencies]
cmake = ">=3.25"
ninja = ">=1.11"
numpy = ">=2.0"
pip = "*"
python = ">=3.11,<3.14"
pytest = ">=8"
scikit-build-core = ">=0.10"
nanobind = ">=2.2"
libblas = "*"
liblapack = "*"
matplotlib = ">=3.8"

[target.linux-64.dependencies]
cxx-compiler = ">=1.11"

[tasks]
install-editable = "python -m pip install -v --no-build-isolation -e ."
test = { cmd = "pytest", depends-on = ["install-editable"] }
