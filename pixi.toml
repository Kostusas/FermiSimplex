[workspace]
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "osx-64", "win-64"]
preview = ["pixi-build"]

[package]
name = "fermisimplex"
version = "0.1.0"

[package.build]
backend = { name = "pixi-build-python", version = "*", channels = ["https://prefix.dev/conda-forge"] }

[package.build.config]
compilers = ["cxx"]
noarch = false

[package.host-dependencies]
python = ">=3.11,<3.14"
numpy = ">=2.0"
nanobind = ">=2.2"
scikit-build-core = ">=0.10"
cmake = ">=3.28"
ninja = ">=1.11"
libblas = "*"
liblapack = "*"
pip = "*"

[package.run-dependencies]
python = ">=3.11,<3.14"
numpy = ">=2.0"
libblas = "*"
liblapack = "*"

[dependencies]
cmake = ">=3.28"
ninja = ">=1.11"
numpy = ">=2.0"
pip = "*"
python = ">=3.11,<3.14"
pytest = ">=8"
scikit-build-core = ">=0.10"
nanobind = ">=2.2"
libblas = "*"
liblapack = "*"
matplotlib = ">=3.8"

[target.linux-64.dependencies]
cxx-compiler = ">=1.11"

[tasks]
install-editable = { cmd = "python -m pip install -v --no-build-isolation -e . --config-settings=cmake.args=-DFETCHCONTENT_SOURCE_DIR_ADAPTIVESIMPLEX=$PIXI_PROJECT_ROOT/build/cpp-tests/_deps/adaptivesimplex-src", depends-on = ["configure-cpp-tests"] }
smoke-test = { cmd = "python examples/quick_start.py", depends-on = ["install-editable"] }
build-package = "pixi build --output-dir dist"
configure-cpp-tests = "cmake -S . -B build/cpp-tests -G Ninja -DFERMISIMPLEX_BUILD_PYTHON=OFF -DFERMISIMPLEX_INSTALL_CPP=ON"
build-cpp-tests = { cmd = "cmake --build build/cpp-tests", depends-on = ["configure-cpp-tests"] }
test-cpp = { cmd = "ctest --test-dir build/cpp-tests --output-on-failure", depends-on = ["build-cpp-tests"] }
test-python = { cmd = "pytest", depends-on = ["install-editable"] }
test = { depends-on = ["test-cpp", "test-python"] }
configure-cpp-benchmarks = "cmake -S . -B build/cpp-benchmarks -G Ninja -DCMAKE_BUILD_TYPE=Release -DFERMISIMPLEX_BUILD_PYTHON=OFF -DFERMISIMPLEX_BUILD_TESTING=OFF -DFERMISIMPLEX_BUILD_BENCHMARKS=ON"
build-cpp-benchmarks = { cmd = "cmake --build build/cpp-benchmarks --target fermisimplex_performance_benchmark", depends-on = ["configure-cpp-benchmarks"] }
benchmark-cpp = { cmd = "cmake --build build/cpp-benchmarks --target fermisimplex_run_performance_benchmark", depends-on = ["configure-cpp-benchmarks"] }
